<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 16px; font-size: 1.4rem; }

  .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  label { font-weight: 600; display: block; margin-bottom: 4px; }

  .grid { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; user-select: none; max-width: 280px; }
  .grid .slot { height: 28px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fafafa; transition: background 0.1s; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #555; }
  .grid .slot:hover { background: #e8f0fe; }
  .grid .slot.selected { background: #4285f4; border-color: #3367d6; color: #fff; }

  button.action { display: inline-block; padding: 10px 20px; background: #4285f4; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
  button.action:hover { background: #3367d6; }

  .upload-area { margin: 16px 0; }
  .upload-area input[type="file"] { margin-top: 4px; }

  .unscheduled { margin-top: 12px; color: #c0392b; font-weight: 600; }
  .all-scheduled { margin-top: 12px; color: #27ae60; font-weight: 600; }

  #results { margin-top: 16px; }

  .sched-grid { display: grid; gap: 2px; margin-top: 12px; overflow-x: auto; }
  .sched-grid .hdr { font-weight: 600; font-size: 0.75rem; text-align: center; padding: 4px 2px; word-break: break-word; }
  .sched-grid .time-label { font-size: 0.75rem; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; white-space: nowrap; }
  .sched-grid .cell { height: 26px; border: 1px solid #e0e0e0; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
  .sched-grid .cell.avail { background: #a8d5a2; }
  .sched-grid .cell.unavail { background: #f5f5f5; }
  .sched-grid .cell.meeting { background: #4285f4; color: #fff; font-weight: 600; }
  .sched-grid .cell.visitor-on { background: #bbdefb; }
  .sched-grid .cell.visitor-off { background: #f5f5f5; }
</style>
</head>
<body>

<h1>Generate Schedule</h1>

<div class="card">
  <label>Visitor's available 30-min slots (8:00 – 18:00)</label>
  <div class="grid" id="visitorGrid"></div>

  <div class="upload-area">
    <label>Upload all .json files at once</label>
    <input type="file" id="fileInput" multiple accept=".json">
    <div id="fileList" style="margin-top:6px; font-size:0.85rem; color:#555;"></div>
  </div>

  <button class="action" onclick="generateSchedule()">Generate Schedule</button>

  <div id="results"></div>
</div>

<script>
const SLOT_COUNT = 20;
const colleagues = [];

function slotLabel(i) {
  const totalMinutes = 8 * 60 + i * 30;
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  const hh = String(h).padStart(2, '0');
  const mm = String(m).padStart(2, '0');
  const endMin = totalMinutes + 30;
  const eh = Math.floor(endMin / 60);
  const em = endMin % 60;
  return `${hh}:${mm}\u2013${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
}

function buildGrid(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const slots = [];
  let dragging = false;
  let dragMode = false;
  let lastIndex = -1;

  for (let i = 0; i < SLOT_COUNT; i++) {
    const cell = document.createElement('div');
    cell.className = 'slot';
    cell.dataset.index = i;
    cell.textContent = slotLabel(i);
    cell.addEventListener('mousedown', (e) => {
      e.preventDefault();
      dragging = true;
      lastIndex = i;
      dragMode = !cell.classList.contains('selected');
      cell.classList.toggle('selected', dragMode);
    });
    cell.addEventListener('mouseenter', () => {
      if (!dragging) return;
      const lo = Math.min(lastIndex, i);
      const hi = Math.max(lastIndex, i);
      for (let j = lo; j <= hi; j++) {
        slots[j].classList.toggle('selected', dragMode);
      }
      lastIndex = i;
    });
    container.appendChild(cell);
    slots.push(cell);
  }

  document.addEventListener('mouseup', () => { dragging = false; lastIndex = -1; });
  return slots;
}

const visitorSlots = buildGrid('visitorGrid');

function getSlotValues(slotElements) {
  return slotElements.map(s => s.classList.contains('selected'));
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  colleagues.length = 0;
  const listEl = document.getElementById('fileList');
  listEl.textContent = '';
  const names = [];
  for (const file of e.target.files) {
    try {
      const text = await file.text();
      const obj = JSON.parse(text);
      if (obj.name && Array.isArray(obj.slots) && obj.slots.length === SLOT_COUNT) {
        colleagues.push(obj);
        names.push(obj.name);
      } else {
        names.push(file.name + ' (invalid)');
      }
    } catch {
      names.push(file.name + ' (error)');
    }
  }
  listEl.textContent = 'Loaded: ' + names.join(', ');
});

function generateSchedule() {
  const visitorAvail = getSlotValues(visitorSlots);
  if (!visitorAvail.some(Boolean)) { alert('Mark the visitor\'s available slots first.'); return; }
  if (colleagues.length === 0) { alert('Upload at least one colleague file.'); return; }

  const entries = colleagues.map(c => {
    const overlap = [];
    for (let i = 0; i < SLOT_COUNT; i++) {
      if (c.slots[i] && visitorAvail[i]) overlap.push(i);
    }
    return { name: c.name, overlap };
  });

  entries.sort((a, b) => a.overlap.length - b.overlap.length);

  const assigned = [];
  const usedSlots = new Set();
  const unscheduled = [];

  for (const entry of entries) {
    const available = entry.overlap.filter(s => !usedSlots.has(s));
    if (available.length > 0) {
      const slot = available[0];
      usedSlots.add(slot);
      assigned.push({ name: entry.name, slot });
    } else {
      unscheduled.push(entry.name);
    }
  }

  assigned.sort((a, b) => a.slot - b.slot);

  // Build assignment lookup: slot index -> colleague name
  const assignmentMap = {};
  for (const a of assigned) assignmentMap[a.slot] = a.name;

  const sortedColleagues = [...colleagues].sort((a, b) => a.name.localeCompare(b.name));
  const colCount = 2 + sortedColleagues.length; // time + visitor + colleagues
  const colWidth = Math.max(60, Math.min(90, Math.floor(600 / colCount)));

  const results = document.getElementById('results');
  let html = '';

  // Grid layout
  html += `<div class="sched-grid" style="grid-template-columns: 90px ${colWidth}px repeat(${sortedColleagues.length}, ${colWidth}px);">`;

  // Header row
  html += '<div class="hdr"></div>';
  html += '<div class="hdr">Schedule</div>';
  for (const c of sortedColleagues) {
    html += `<div class="hdr">${esc(c.name)}</div>`;
  }

  // One row per time slot
  for (let i = 0; i < SLOT_COUNT; i++) {
    // Time label
    html += `<div class="time-label">${slotLabel(i)}</div>`;

    // Visitor schedule column: show meeting assignment or visitor availability
    if (assignmentMap[i] !== undefined) {
      html += `<div class="cell meeting">${esc(assignmentMap[i])}</div>`;
    } else if (visitorAvail[i]) {
      html += '<div class="cell visitor-on"></div>';
    } else {
      html += '<div class="cell visitor-off"></div>';
    }

    // Colleague columns
    for (const c of sortedColleagues) {
      html += `<div class="cell ${c.slots[i] ? 'avail' : 'unavail'}"></div>`;
    }
  }

  html += '</div>';

  // Legend
  html += '<div style="margin-top:10px; font-size:0.75rem; display:flex; gap:12px; flex-wrap:wrap;">';
  html += '<span><span style="display:inline-block;width:12px;height:12px;background:#4285f4;border-radius:2px;vertical-align:middle;"></span> Meeting</span>';
  html += '<span><span style="display:inline-block;width:12px;height:12px;background:#bbdefb;border-radius:2px;vertical-align:middle;"></span> Visitor free</span>';
  html += '<span><span style="display:inline-block;width:12px;height:12px;background:#a8d5a2;border-radius:2px;vertical-align:middle;"></span> Colleague available</span>';
  html += '</div>';

  if (unscheduled.length > 0) {
    html += `<p class="unscheduled">Unscheduled: ${unscheduled.map(esc).join(', ')}</p>`;
  }
  if (unscheduled.length === 0 && assigned.length > 0) {
    html += '<p class="all-scheduled">All colleagues scheduled!</p>';
  }

  results.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
